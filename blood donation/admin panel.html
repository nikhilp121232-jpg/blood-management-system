<script>
// ======================= DATA (Load from localStorage) =======================
// Load donors from localStorage (synced with registration form)
function loadDonorsFromStorage() {
  try {
    const stored = localStorage.getItem('lifesaver_donors');
    if (stored) {
      return JSON.parse(stored);
    }
  } catch (e) {
    console.error('Error loading donors:', e);
  }
  // Default demo data if nothing in storage
  return [
    {id:'D001',name:'Riya Sharma',blood:'O+',age:26,phone:'9876543210',city:'Mumbai',last:'Feb 28, 2026',status:'Active',donations:4},
    {id:'D002',name:'Arjun Mehta',blood:'A+',age:34,phone:'9123456789',city:'Delhi',last:'Jan 15, 2026',status:'Active',donations:7},
    {id:'D003',name:'Priya Nair',blood:'AB-',age:29,phone:'9988776655',city:'Kochi',last:'Mar 01, 2026',status:'Active',donations:2},
    {id:'D004',name:'Karan Patel',blood:'B+',age:41,phone:'9001122334',city:'Ahmedabad',last:'Dec 10, 2025',status:'Inactive',donations:12},
    {id:'D005',name:'Sneha Reddy',blood:'O-',age:23,phone:'8765432109',city:'Hyderabad',last:'Mar 05, 2026',status:'Active',donations:1},
    {id:'D006',name:'Rahul Gupta',blood:'A-',age:38,phone:'9012345678',city:'Pune',last:'Feb 01, 2026',status:'Pending',donations:3},
    {id:'D007',name:'Ananya Singh',blood:'B-',age:31,phone:'8899001122',city:'Kolkata',last:'Jan 30, 2026',status:'Active',donations:5},
    {id:'D008',name:'Dev Krishnan',blood:'AB+',age:27,phone:'9911223344',city:'Chennai',last:'Mar 03, 2026',status:'Active',donations:2},
  ];
}

// Load blood requests from localStorage (synced with request form)
function loadRequestsFromStorage() {
  try {
    const stored = localStorage.getItem('lifesaver_requests');
    if (stored) {
      return JSON.parse(stored);
    }
  } catch (e) {
    console.error('Error loading requests:', e);
  }
  // Default demo data if nothing in storage
  return [
    {id:'REQ-001',hospital:'City Hospital',patient:'Meera Joshi',blood:'O-',units:2,urgency:'High',date:'Mar 06, 2026',status:'Open'},
    {id:'REQ-002',hospital:'Apollo Medical',patient:'Raj Verma',blood:'AB+',units:1,urgency:'High',date:'Mar 06, 2026',status:'Open'},
    {id:'REQ-003',hospital:'Sunrise Clinic',patient:'Fatima Khan',blood:'B-',units:3,urgency:'Medium',date:'Mar 07, 2026',status:'Matched'},
    {id:'REQ-004',hospital:'Lilavati Hospital',patient:'Suresh Iyer',blood:'A+',units:2,urgency:'Low',date:'Mar 09, 2026',status:'Open'},
    {id:'REQ-005',hospital:'Max Healthcare',patient:'Priya Deshpande',blood:'O+',units:4,urgency:'Medium',date:'Mar 08, 2026',status:'Fulfilled'},
  ];
}

let donors = loadDonorsFromStorage();
let bloodRequests = loadRequestsFromStorage();
const inventory = [
  {t:'A+',u:18,p:75},{t:'A-',u:6,p:25},{t:'B+',u:22,p:90},{t:'B-',u:2,p:8},
  {t:'AB+',u:9,p:38},{t:'AB-',u:4,p:17},{t:'O+',u:26,p:100},{t:'O-',u:5,p:21}
];
const canGiveTo = {'O-':['O-','O+','A-','A+','B-','B+','AB-','AB+'],'O+':['O+','A+','B+','AB+'],'A-':['A-','A+','AB-','AB+'],'A+':['A+','AB+'],'B-':['B-','B+','AB-','AB+'],'B+':['B+','AB+'],'AB-':['AB-','AB+'],'AB+':['AB+']};

// Helper: Toast
function showToast(type, title, msg){
  const panel = document.getElementById('toastPanel');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  const icons = {red:'đź©¸', gold:'âšˇ', green:'âś…'};
  toast.innerHTML = `<div class="toast-icon">${icons[type]||'đź“˘'}</div><div><div class="toast-title">${title}</div><div class="toast-msg">${msg}</div></div><button class="toast-x" onclick="this.parentElement.remove()">Ă—</button>`;
  panel.appendChild(toast);
  setTimeout(()=>toast.remove(), 4500);
}

// UI helpers
function sbadge(s){ const m={Active:'sb-active',Inactive:'sb-inactive',Pending:'sb-pending',Open:'sb-pending',Matched:'sb-active',Fulfilled:'sb-inactive'}; return `<span class="sbadge ${m[s]||''}">${s}</span>`; }
function urgPill(u){ const m={High:'pill-red',Medium:'pill-gold',Low:'pill-green'}; return `<span class="pill ${m[u]||''}">${u}</span>`; }

// Navigation
function showPage(pageName){
  document.querySelectorAll('.adm-nav-item').forEach(item=>item.classList.remove('active'));
  document.querySelector(`.adm-nav-item[data-page="${pageName}"]`)?.classList.add('active');
  document.getElementById('admContent').innerHTML = '';
  if(pageName === 'dashboard') renderDashboard();
  else if(pageName === 'donors') renderDonors();
  else if(pageName === 'requests') renderRequests();
  else if(pageName === 'inventory') renderInventory();
  else if(pageName === 'matching') renderMatching();
  else if(pageName === 'alerts') renderAlerts();
  const titles = {dashboard:'Blood Donor <em>Dashboard</em>',donors:'Donor <em>Registry</em>',requests:'Blood <em>Requests</em>',inventory:'Blood <em>Inventory</em>',matching:'AI Donor <em>Matching</em>',alerts:'Alerts & <em>Notifications</em>'};
  document.getElementById('admPageTitle').innerHTML = titles[pageName] || pageName;
}
// Dashboard
function renderDashboard(){
  const openReqs = bloodRequests.filter(r=>r.status==='Open').length;
  const activeDonors = donors.filter(d=>d.status==='Active').length;
  const totalLives = donors.reduce((sum,d)=>sum + d.donations*3, 0);
  document.getElementById('admContent').innerHTML = `
    <div class="adm-stats">
      <div class="adm-stat"><div class="adm-stat-label">Total Donors</div><div class="adm-stat-val">${donors.length+1276}</div><div class="adm-stat-sub">+48 this month</div></div>
      <div class="adm-stat gold"><div class="adm-stat-label">Lives Saved</div><div class="adm-stat-val">${totalLives+2400}</div><div class="adm-stat-sub">â†‘ 12% vs last month</div></div>
      <div class="adm-stat blue"><div class="adm-stat-label">Pending Requests</div><div class="adm-stat-val">${openReqs}</div><div class="adm-stat-sub">Needs matching</div></div>
      <div class="adm-stat green"><div class="adm-stat-label">Active Donors</div><div class="adm-stat-val">${activeDonors}</div><div class="adm-stat-sub">Ready to donate</div></div>
    </div>
    <div class="adm-two-col">
      <div class="adm-card"><div class="adm-card-header"><div class="adm-card-title">Recent Donors</div><button class="adm-btn adm-btn-ghost" style="font-size:11px" onclick="showPage('donors')">View All</button></div>
      <table class="adm-table"><thead><tr><th>Donor</th><th>Blood</th><th>Last Donation</th><th>Status</th></tr></thead><tbody>${donors.slice(0,5).map(d=>`<tr><td><div style="display:flex;align-items:center;gap:10px"><div class="adm-blood">${d.blood}</div><div><div class="adm-dname">${d.name}</div><div class="adm-did">${d.id}</div></div></div></td><td>${d.blood}</td><td>${d.last}</td><td>${sbadge(d.status)}</td></tr>`).join('')}</tbody></table></div>
      <div><div class="adm-card"><div class="adm-card-header"><div class="adm-card-title">Urgent Requests</div></div><div class="activity-list">${bloodRequests.filter(r=>r.urgency==='High' && r.status!=='Fulfilled').map(r=>`<div class="activity-item"><div class="activity-dot"></div><div><div class="activity-text"><strong>${r.hospital}</strong> â€” ${r.blood} (${r.units} units)</div><div class="activity-time">${r.patient}</div></div><button class="adm-btn adm-btn-red" style="font-size:10px;padding:4px 12px" onclick='openMatchForReq(${JSON.stringify(r).replace(/'/g,"&#39;")})'>Match</button></div>`).join('')}</div></div></div>
    </div>`;
}
// Donors
function renderDonors(){
  document.getElementById('admContent').innerHTML = `
    <div class="filter-bar"><div class="filter-input"><svg viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg><input type="text" id="donorSearch" placeholder="Search by name or ID" oninput="filterDonors()"></div>
    <div class="filter-select"><select id="bloodFilter" onchange="filterDonors()"><option value="">All Blood Types</option><option>A+</option><option>A-</option><option>B+</option><option>B-</option><option>AB+</option><option>AB-</option><option>O+</option><option>O-</option></select></div>
    <div class="filter-select"><select id="statusFilter" onchange="filterDonors()"><option value="">All Statuses</option><option>Active</option><option>Inactive</option><option>Pending</option></select></div></div>
    <div class="adm-card"><table class="adm-table"><thead><tr><th>Donor</th><th>Blood</th><th>Age</th><th>Phone</th><th>City</th><th>Donations</th><th>Status</th></tr></thead><tbody id="donorTableBody"></tbody></table></div>`;
  filterDonors();
}
window.filterDonors = function(){
  const search = document.getElementById('donorSearch')?.value.toLowerCase()||'';
  const blood = document.getElementById('bloodFilter')?.value||'';
  const status = document.getElementById('statusFilter')?.value||'';
  const filtered = donors.filter(d=> (!search||d.name.toLowerCase().includes(search)||d.id.toLowerCase().includes(search)) && (!blood||d.blood===blood) && (!status||d.status===status));
  const tbody = document.getElementById('donorTableBody');
  if(tbody) tbody.innerHTML = filtered.map(d=>`<tr><td><div><div class="adm-dname">${d.name}</div><div class="adm-did">${d.id}</div></div></td><td><div class="adm-blood">${d.blood}</div></td><td>${d.age}</td><td>${d.phone}</td><td>${d.city}</td><td>${d.donations}</td><td>${sbadge(d.status)}</td></tr>`).join('');
}
// Requests
function renderRequests(){
  document.getElementById('admContent').innerHTML = `<div style="display:flex;justify-content:flex-end;margin-bottom:20px"><button class="adm-btn adm-btn-red" onclick="document.getElementById('reqModal').classList.add('open')">+ New Request</button></div>${bloodRequests.map(r=>`<div style="background:white;border-radius:14px;border:1px solid var(--lgray);padding:18px 22px;margin-bottom:12px;display:flex;align-items:center;gap:18px"><div style="width:50px;height:50px;background:rgba(192,24,42,0.08);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:var(--red)">${r.blood}</div><div style="flex:1"><div style="font-weight:700">${r.hospital} â€” ${r.patient}</div><div style="font-size:12px;color:#aaa">${r.units} units Â· ${r.date} Â· ${r.id}</div></div>${urgPill(r.urgency)} ${sbadge(r.status)}<button class="adm-btn adm-btn-ghost" style="font-size:11px" onclick='openMatchForReq(${JSON.stringify(r).replace(/'/g,"&#39;")})'>AI Match</button></div>`).join('')}`;
}
// Inventory
function renderInventory(){
  document.getElementById('admContent').innerHTML = `<div class="inv-grid">${inventory.map(i=>`<div class="inv-card"><div class="inv-type">${i.t}</div><div class="inv-units">${i.u}</div><div style="font-size:11px;color:#aaa">units available</div><div class="inv-bar"><div class="inv-bar-fill" style="width:${i.p}%"></div></div></div>`).join('')}</div><div class="adm-card"><div class="adm-card-header"><div class="adm-card-title">Recent Blood Batches</div></div><table class="adm-table"><thead><tr><th>Batch ID</th><th>Blood Type</th><th>Units</th><th>Collection Date</th><th>Expiry</th></tr></thead><tbody><tr><td>#BAT-101</td><td>O+</td><td>18</td><td>Mar 01, 2026</td><td>Apr 01, 2026</td></tr><tr><td>#BAT-102</td><td>B-</td><td>4</td><td>Feb 28, 2026</td><td>Mar 28, 2026</td></tr></tbody></table></div>`;
}
// Matching
function renderMatching(){
  document.getElementById('admContent').innerHTML = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">${bloodRequests.filter(r=>r.status!=='Fulfilled').map(r=>`<div class="adm-card"><div class="adm-card-header"><div><div class="adm-card-title">${r.id}</div><div style="font-size:12px;color:#666">${r.hospital} Â· ${r.blood}</div></div><button class="adm-btn adm-btn-red" style="font-size:11px" onclick='openMatchForReq(${JSON.stringify(r).replace(/'/g,"&#39;")})'>Find Matches</button></div><div style="padding:14px 20px;display:flex;gap:12px">${urgPill(r.urgency)} ${sbadge(r.status)} <span>${r.units} units</span></div></div>`).join('')}</div>`;
}
// Alerts
function renderAlerts(){
  document.getElementById('admContent').innerHTML = `<div class="adm-two-col"><div class="adm-card"><div class="adm-card-header"><div class="adm-card-title">Send Notification</div></div><div style="padding:24px"><textarea id="alertMsg" style="width:100%;padding:12px;border:1.5px solid var(--lgray);border-radius:12px;min-height:120px;font-family:Lato;resize:vertical" placeholder="Type message for all active donors..."></textarea><button class="adm-btn adm-btn-red" style="margin-top:20px;width:100%" onclick="sendAlert()">đź“˘ Send to All Active Donors</button></div></div><div class="adm-card"><div class="adm-card-header"><div class="adm-card-title">Recent Alerts</div></div><div class="activity-list"><div class="activity-item"><div class="activity-dot"></div><div><div class="activity-text"><strong>Urgent O- alert</strong> sent to 12 donors</div><div class="activity-time">Today, 10:23 AM</div></div></div><div class="activity-item"><div class="activity-dot gold"></div><div><div class="activity-text"><strong>Reminder: donation camp</strong> sent to 45 donors</div><div class="activity-time">Mar 04, 2026</div></div></div></div></div></div>`;
}
window.sendAlert = function(){
  const msg = document.getElementById('alertMsg')?.value.trim();
  if(!msg){ showToast('red','Missing Message','Please enter a message'); return; }
  const activeCount = donors.filter(d=>d.status==='Active').length;
  showToast('green','Alerts Sent',`Message sent to ${activeCount} active donors via SMS/Email.`);
  document.getElementById('alertMsg').value = '';
}

// AI Matching Logic
let currentMatchReq = null, currentMatchDonors = [];
function openMatchForReq(req){
  currentMatchReq = req;
  document.getElementById('matchInfo').innerHTML = `<strong>${req.id}</strong> â€” ${req.hospital} Â· ${req.patient}<br/>Required: <strong>${req.blood}</strong> Â· ${req.units} unit(s) Â· ${req.urgency} priority`;
  document.getElementById('matchResults').innerHTML = `<div style="text-align:center;padding:30px"><div style="width:32px;height:32px;border:3px solid rgba(192,24,42,0.2);border-top-color:var(--red);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px"></div>Scanning donor database...</div>`;
  document.getElementById('matchModal').classList.add('open');
  setTimeout(()=>{
    const compatible = donors.filter(d=> d.status==='Active' && (canGiveTo[d.blood]||[]).includes(req.blood));
    currentMatchDonors = compatible.map(d=>{ let score=60; if(d.blood===req.blood) score+=30; if(d.donations>=3) score+=5; if(d.city==='Mumbai'||d.city==='Delhi') score+=3; score=Math.min(score,98); return {...d,score}; }).sort((a,b)=>b.score-a.score).slice(0,5);
    if(!currentMatchDonors.length){ document.getElementById('matchResults').innerHTML = `<div style="text-align:center;padding:20px;color:#aaa">No compatible active donors found.</div>`; return; }
    document.getElementById('matchResults').innerHTML = currentMatchDonors.map(d=>`<div style="background:#fefaf5;border-radius:12px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:14px;border:1px solid var(--lgray)"><div style="width:44px;height:44px;background:${d.score>80?'#1a6b47':'var(--red)'};border-radius:12px;display:flex;align-items:center;justify-content:center;color:white;font-weight:900">${d.score}%</div><div style="flex:1"><div><strong>${d.name}</strong> <span style="color:#aaa">${d.blood} Â· ${d.city}</span></div><div style="font-size:11px;color:#666">${d.donations} donations Â· ${d.phone}</div></div><button class="adm-btn adm-btn-red" style="font-size:11px" onclick="showToast('gold','Notified','${d.name} has been alerted')">Notify</button></div>`).join('');
    document.getElementById('notifyMatchesBtn').onclick = ()=>{ if(currentMatchDonors.length){ closeModal('matchModal'); showToast('green','Donors Notified',`${currentMatchDonors.length} donors notified for ${currentMatchReq?.id}.`); } };
  }, 800);
}
function addDonor(){
  const fn=document.getElementById('aFname').value.trim(), ln=document.getElementById('aLname').value.trim(), bt=document.getElementById('aBT').value;
  if(!fn||!ln||!bt){ showToast('red','Missing Fields','Please fill required fields'); return; }
  const id='D'+(donors.length+1).toString().padStart(3,'0');
  const newDonor = {
    id,
    name:`${fn} ${ln}`,
    blood:bt,
    age:parseInt(document.getElementById('aAge').value)||0,
    phone:document.getElementById('aPhone').value,
    city:document.getElementById('aCity').value,
    email:document.getElementById('aEmail').value,
    last:'â€”',
    status:document.getElementById('aStat').value,
    donations:0,
    registeredAt: new Date().toLocaleString()
  };
  donors.unshift(newDonor);
  
  // Save to localStorage
  localStorage.setItem('lifesaver_donors', JSON.stringify(donors));
  
  closeModal('donorModal');
  showToast('green','Donor Added',`${fn} ${ln} (${bt}) registered.`);
  if(document.querySelector('.adm-nav-item.active')?.dataset.page === 'donors') renderDonors();
}
function addBloodRequest(){
  const hosp=document.getElementById('rHosp').value.trim(), bt=document.getElementById('rBT').value;
  if(!hosp||!bt){ showToast('red','Missing Fields','Hospital & Blood type required'); return; }
  const id='REQ-'+(bloodRequests.length+1).toString().padStart(3,'0');
  const newRequest = {
    id,
    hospital:hosp,
    patient:document.getElementById('rPat').value,
    blood:bt,
    units:parseInt(document.getElementById('rUnits').value)||1,
    urgency:document.getElementById('rUrg').value,
    date:new Date().toLocaleDateString('en-US'),
    status:'Open',
    notes:document.getElementById('rNotes')?.value || ''
  };
  bloodRequests.unshift(newRequest);
  
  // Save to localStorage
  localStorage.setItem('lifesaver_requests', JSON.stringify(bloodRequests));
  
  closeModal('reqModal');
  showToast('green','Request Created',`${id} submitted successfully.`);
  if(document.querySelector('.adm-nav-item.active')?.dataset.page === 'requests') renderRequests();
}
function closeModal(id){ document.getElementById(id).classList.remove('open'); }

// Mobile Menu Toggle
const mobileMenuBtn = document.getElementById('mobileMenuBtn');
const mobileOverlay = document.getElementById('mobileOverlay');
const sidebar = document.querySelector('.adm-sidebar');

function toggleMobileMenu(){
  mobileMenuBtn?.classList.toggle('active');
  sidebar?.classList.toggle('mobile-open');
  mobileOverlay?.classList.toggle('show');
}

mobileMenuBtn?.addEventListener('click', toggleMobileMenu);
mobileOverlay?.addEventListener('click', toggleMobileMenu);

// Close mobile menu when nav item clicked
document.querySelectorAll('.adm-nav-item[data-page]').forEach(btn=> {
  btn.addEventListener('click',()=> {
    if(window.innerWidth <= 700){
      toggleMobileMenu();
    }
  });
});

// Close modals on overlay click
['donorModal','reqModal','matchModal'].forEach(id=>{ document.getElementById(id)?.addEventListener('click',e=>{ if(e.target===document.getElementById(id)) closeModal(id); }); });

// Auto-refresh data from localStorage every 2 seconds
setInterval(() => {
  const newDonors = loadDonorsFromStorage();
  const newRequests = loadRequestsFromStorage();
  
  // Only update if data changed
  if (JSON.stringify(newDonors) !== JSON.stringify(donors)) {
    donors = newDonors;
    const currentPage = document.querySelector('.adm-nav-item.active')?.dataset.page;
    if (currentPage === 'donors' || currentPage === 'dashboard') {
      showPage(currentPage);
    }
  }
  
  if (JSON.stringify(newRequests) !== JSON.stringify(bloodRequests)) {
    bloodRequests = newRequests;
    const currentPage = document.querySelector('.adm-nav-item.active')?.dataset.page;
    if (currentPage === 'requests' || currentPage === 'dashboard' || currentPage === 'matching') {
      showPage(currentPage);
    }
  }
}, 2000);

// Initialize
showPage('dashboard');
